<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SeuCuidado Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      height: 100vh;
      overflow: hidden;
      color: #1d1d1f;
    }

    .container {
      position: absolute;
      top: 24px; left: 24px; right: 24px; bottom: 24px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 28px 36px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .header-left {}
    .step-label {
      font-size: 11px;
      font-weight: 600;
      color: #667eea;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 20px;
    }
    h1 span { color: #667eea; }

    /* --- Tabs --- */
    .tab-bar {
      display: flex;
      gap: 0;
      background: #f0f0f5;
      border-radius: 10px;
      padding: 3px;
      margin: 0 36px;
    }
    .tab-bar button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 8px;
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      color: #86868b;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-bar button.active {
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      color: #667eea;
      font-weight: 600;
    }

    /* --- Date navigator --- */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px 36px 8px;
    }
    .date-nav button {
      width: 32px;
      height: 32px;
      border: 1px solid #e0e0e5;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      color: #667eea;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .date-nav button:hover:not(:disabled) { background: #f0f0f5; }
    .date-nav button:disabled { opacity: 0.3; cursor: default; }
    .date-label {
      font-size: 15px;
      font-weight: 600;
      color: #1d1d1f;
      min-width: 200px;
      text-align: center;
    }

    /* --- Content area --- */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 36px 24px;
    }

    /* --- Metric cards grid --- */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .metric-card {
      background: #f5f5f7;
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .metric-card .metric-label {
      font-size: 11px;
      font-weight: 500;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .metric-card .metric-value {
      font-size: 32px;
      font-weight: 700;
      color: #1d1d1f;
      line-height: 1;
    }
    .metric-card .metric-value .unit {
      font-size: 16px;
      font-weight: 500;
      color: #86868b;
    }
    .metric-card .metric-sub {
      font-size: 11px;
      color: #86868b;
      margin-top: 4px;
    }
    .metric-card.score { position: relative; }
    .metric-card.score canvas {
      position: absolute;
      top: 12px;
      right: 16px;
    }
    .metric-card.good .metric-value { color: #34c759; }
    .metric-card.warn .metric-value { color: #ff9500; }
    .metric-card.bad .metric-value { color: #ff3b30; }

    /* --- Chart area --- */
    .chart-section {
      background: #f5f5f7;
      border-radius: 14px;
      padding: 18px 20px;
    }
    .chart-title {
      font-size: 11px;
      font-weight: 500;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .chart-container {
      position: relative;
      width: 100%;
      height: 200px;
    }
    .chart-container canvas {
      width: 100%;
      height: 100%;
    }

    /* --- Legend --- */
    .chart-legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #86868b;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .legend-dot.good { background: #34c759; }
    .legend-dot.bad { background: #ff3b30; }
    .legend-dot.empty { background: #e0e0e5; }

    /* --- Empty state --- */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #86868b;
      text-align: center;
    }
    .empty-state.visible { display: flex; }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }
    .empty-text {
      font-size: 14px;
      font-weight: 500;
    }

    .data-view { display: block; }
    .data-view.hidden { display: none; }

    /* --- Export button --- */
    .btn-export {
      margin-top: 4px;
      padding: 8px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(102,126,234,0.3);
    }
    .btn-export:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .btn-export:disabled { opacity: 0.5; cursor: default; transform: none; }
    .btn-export.hidden { display: none; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .content { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="step-label" data-i18n="report.label">Posture Report</div>
        <h1 data-i18n-html="report.heading">Your posture <span>insights</span></h1>
      </div>
      <button class="btn-export hidden" id="export-pdf-btn" data-i18n="report.exportPDF">Export PDF</button>
    </div>

    <div class="tab-bar">
      <button class="active" data-tab="day" data-i18n="report.tab.day">Day</button>
      <button data-tab="week" data-i18n="report.tab.week">Week</button>
      <button data-tab="month" data-i18n="report.tab.month">Month</button>
    </div>

    <div class="date-nav">
      <button id="nav-prev">&#8592;</button>
      <span class="date-label" id="date-label"></span>
      <button id="nav-next">&#8594;</button>
    </div>

    <div class="content">
      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">&#9744;</div>
        <div class="empty-text" id="empty-text" data-i18n="report.noData">No data for this day</div>
      </div>

      <!-- Data view -->
      <div class="data-view" id="data-view">
        <div class="metrics-grid">
          <div class="metric-card score" id="card-score">
            <div class="metric-label" data-i18n="report.goodPosture">Good posture</div>
            <div class="metric-value" id="val-score">--<span class="unit">%</span></div>
            <canvas id="ring-canvas" width="56" height="56"></canvas>
          </div>
          <div class="metric-card" id="card-alerts">
            <div class="metric-label" data-i18n="report.alerts">Posture alerts</div>
            <div class="metric-value" id="val-alerts">--</div>
          </div>
          <div class="metric-card" id="card-sitting">
            <div class="metric-label" data-i18n="report.sittingTime">Sitting time</div>
            <div class="metric-value" id="val-sitting">--</div>
            <div class="metric-sub" id="sub-sitting"></div>
          </div>
          <div class="metric-card" id="card-breaks">
            <div class="metric-label" data-i18n="report.breakAlerts">Break alerts</div>
            <div class="metric-value" id="val-breaks">--</div>
          </div>
        </div>

        <div class="chart-section">
          <div class="chart-title" id="chart-title" data-i18n="report.hourlyBreakdown">Hourly breakdown</div>
          <div class="chart-container">
            <canvas id="chart-canvas"></canvas>
          </div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot good"></div> <span data-i18n="report.good">Good</span></div>
            <div class="legend-item"><div class="legend-dot bad"></div> <span data-i18n="report.bad">Bad</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="report.js"></script>
</body>
</html>
