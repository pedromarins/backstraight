<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @page { size: A4; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      width: 210mm;
      min-height: 297mm;
      padding: 18mm 16mm 14mm;
      color: #1d1d1f;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      background: #fff;
    }

    /* --- Header --- */
    .pdf-header {
      border-bottom: 2px solid #667eea;
      padding-bottom: 14px;
      margin-bottom: 20px;
    }
    .brand {
      font-size: 11px;
      font-weight: 700;
      color: #667eea;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .brand-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin-right: 6px;
      vertical-align: middle;
    }
    .pdf-title {
      font-size: 24px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 6px;
    }
    .pdf-meta {
      font-size: 11px;
      color: #86868b;
    }
    .pdf-meta span { margin-right: 20px; }

    /* --- Metrics row --- */
    .metrics-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .metric-box {
      flex: 1;
      background: #f5f5f7;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .metric-box .label {
      font-size: 9px;
      font-weight: 500;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .metric-box .value {
      font-size: 26px;
      font-weight: 700;
      color: #1d1d1f;
      line-height: 1;
    }
    .metric-box .value .unit {
      font-size: 14px;
      font-weight: 500;
      color: #86868b;
    }
    .metric-box.good .value { color: #34c759; }
    .metric-box.warn .value { color: #ff9500; }
    .metric-box.bad .value { color: #ff3b30; }

    /* --- Chart --- */
    .chart-section {
      margin-bottom: 24px;
    }
    .chart-label {
      font-size: 10px;
      font-weight: 500;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .chart-img { width: 100%; }
    .chart-legend {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-top: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: #86868b;
    }
    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 2px;
    }
    .legend-dot.good { background: #34c759; }
    .legend-dot.bad { background: #ff3b30; }
    .legend-dot.warn { background: #ff9500; }

    /* --- Breakdown table --- */
    .breakdown-section { margin-bottom: 20px; }
    .breakdown-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .breakdown-table th {
      text-align: left;
      padding: 8px 10px;
      background: #f5f5f7;
      color: #86868b;
      font-weight: 600;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .breakdown-table th:first-child { border-radius: 6px 0 0 6px; }
    .breakdown-table th:last-child { border-radius: 0 6px 6px 0; }
    .breakdown-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f0f0f5;
      color: #1d1d1f;
    }
    .score-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 10px;
    }
    .score-badge.good { background: #e8f8ec; color: #34c759; }
    .score-badge.warn { background: #fff5e6; color: #ff9500; }
    .score-badge.bad { background: #fce8e8; color: #ff3b30; }

    /* --- Footer --- */
    .pdf-footer {
      position: fixed;
      bottom: 10mm;
      left: 16mm;
      right: 16mm;
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      color: #b0b0b5;
      border-top: 1px solid #e8e8ed;
      padding-top: 6px;
    }

    /* --- Empty --- */
    .empty-msg {
      text-align: center;
      padding: 40px;
      color: #86868b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="pdf-header">
    <div class="brand"><span class="brand-dot"></span>BACKSTRAIGHT</div>
    <div class="pdf-title" id="pdf-title"></div>
    <div class="pdf-meta">
      <span id="pdf-period"></span>
      <span id="pdf-gen-date"></span>
    </div>
  </div>

  <div class="metrics-row" id="pdf-metrics"></div>

  <div class="chart-section">
    <div class="chart-label" id="chart-label"></div>
    <canvas id="pdf-chart" width="700" height="240" style="display:none;"></canvas>
    <img class="chart-img" id="pdf-chart-img">
    <div class="chart-legend" id="chart-legend"></div>
  </div>

  <div class="breakdown-section" id="pdf-breakdown"></div>

  <div class="pdf-footer">
    <span id="pdf-footer-left"></span>
    <span id="pdf-footer-right"></span>
  </div>

  <script type="module">
    import { t, setLocale } from './i18n.mjs';

    window.pdfData.onData((data) => {
      setLocale(data.locale);
      renderPDF(data);
    });

    function scoreClass(pct) {
      if (pct >= 75) return 'good';
      if (pct >= 50) return 'warn';
      return 'bad';
    }

    function fmtMs(ms) {
      const totalMin = Math.floor(ms / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    function renderPDF(data) {
      const { type, totals, days, weeks, period } = data;

      // Header
      document.getElementById('pdf-title').textContent =
        type === 'weekly' ? t('pdf.title.weekly') : t('pdf.title.monthly');
      document.getElementById('pdf-period').textContent = `${t('pdf.period')}: ${period.label}`;

      const now = new Date();
      const loc = data.locale === 'pt-BR' ? 'pt-BR' : 'en-US';
      const genDate = now.toLocaleDateString(loc, { year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('pdf-gen-date').textContent = t('pdf.generated', { date: genDate });

      // Metrics
      const pct = totals.monitoredMs > 0
        ? Math.round((totals.goodPostureMs / totals.monitoredMs) * 100)
        : 0;
      const sc = scoreClass(pct);

      document.getElementById('pdf-metrics').innerHTML = `
        <div class="metric-box ${sc}">
          <div class="label">${t('pdf.score')}</div>
          <div class="value">${pct}<span class="unit">%</span></div>
        </div>
        <div class="metric-box">
          <div class="label">${t('pdf.alerts')}</div>
          <div class="value">${totals.alertCount || 0}</div>
        </div>
        <div class="metric-box">
          <div class="label">${t('pdf.sittingTime')}</div>
          <div class="value">${fmtMs(totals.totalSittingMs || 0)}</div>
        </div>
        <div class="metric-box">
          <div class="label">${t('pdf.breaks')}</div>
          <div class="value">${totals.breakAlertCount || 0}</div>
        </div>
      `;

      // Chart
      if (totals.monitoredMs === 0) {
        document.getElementById('chart-label').textContent = '';
        document.getElementById('pdf-chart-img').style.display = 'none';
        document.getElementById('chart-legend').innerHTML = '';
        document.getElementById('pdf-breakdown').innerHTML =
          `<div class="empty-msg">${t('pdf.noData')}</div>`;
      } else {
        const canvas = document.getElementById('pdf-chart');
        if (type === 'weekly') {
          document.getElementById('chart-label').textContent = t('report.dailyBreakdown');
          drawWeeklyChart(canvas, days, data.locale);
          document.getElementById('chart-legend').innerHTML =
            legendItems(['good', 'warn', 'bad'], [t('report.good'), '50-74%', t('report.bad')]);
        } else {
          document.getElementById('chart-label').textContent = t('report.dailyScoreBreakdown');
          drawMonthlyChart(canvas, days);
          document.getElementById('chart-legend').innerHTML =
            legendItems(['good', 'warn', 'bad'], [t('report.good'), '50-74%', t('report.bad')]);
        }
        // Convert canvas to img
        document.getElementById('pdf-chart-img').src = canvas.toDataURL('image/png');

        // Weekly breakdown table (only for monthly)
        if (type === 'monthly' && weeks && weeks.length > 0) {
          renderBreakdownTable(weeks, data.locale);
        }
      }

      // Footer
      document.getElementById('pdf-footer-left').textContent = t('pdf.footer');
      document.getElementById('pdf-footer-right').textContent = t('pdf.disclaimer');

      // Signal ready after a small delay to ensure images render
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          window.pdfData.ready();
        });
      });
    }

    function legendItems(classes, labels) {
      return classes.map((c, i) =>
        `<div class="legend-item"><div class="legend-dot ${c}"></div> ${labels[i]}</div>`
      ).join('');
    }

    function renderBreakdownTable(weeks, locale) {
      const loc = locale === 'pt-BR' ? 'pt-BR' : 'en-US';
      const fmtShort = (dateStr) => {
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d).toLocaleDateString(loc, { month: 'short', day: 'numeric' });
      };

      let html = `<div class="chart-label">${t('pdf.weeklyBreakdown')}</div>`;
      html += '<table class="breakdown-table"><thead><tr>';
      html += `<th>${t('pdf.week')}</th><th>${t('pdf.score')}</th><th>${t('pdf.alerts')}</th><th>${t('pdf.sittingTime')}</th><th>${t('pdf.breaks')}</th>`;
      html += '</tr></thead><tbody>';

      for (const w of weeks) {
        const pct = w.monitoredMs > 0 ? Math.round((w.goodPostureMs / w.monitoredMs) * 100) : 0;
        const sc = scoreClass(pct);
        const range = `${fmtShort(w.startDate)} – ${fmtShort(w.endDate)}`;
        html += `<tr>
          <td>${range}</td>
          <td><span class="score-badge ${sc}">${pct}%</span></td>
          <td>${w.alertCount}</td>
          <td>${fmtMs(w.totalSittingMs)}</td>
          <td>${w.breakAlertCount}</td>
        </tr>`;
      }

      html += '</tbody></table>';
      document.getElementById('pdf-breakdown').innerHTML = html;
    }

    // --- Chart drawing (simplified for fixed PDF canvas) ---

    function roundRect(ctx, x, y, w, h, r) {
      if (h <= 0) return;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x, y + h);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawGrid(ctx, W, H, pad, chartH, labelFn) {
      ctx.strokeStyle = '#e8e8ed';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + (chartH / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();
      }
      ctx.fillStyle = '#b0b0b5';
      ctx.font = '10px system-ui';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + (chartH / 4) * i;
        ctx.fillText(labelFn(i), pad.left - 6, y);
      }
    }

    function drawScoreBars(ctx, days, labels, W, H) {
      const count = days.length;
      const pad = { left: 34, right: 16, top: 16, bottom: 28 };
      const chartW = W - pad.left - pad.right;
      const chartH = H - pad.top - pad.bottom;
      const maxBarW = count <= 7 ? 50 : count <= 14 ? 26 : 16;
      const barW = Math.min(Math.floor(chartW / count) - 2, maxBarW);
      const gap = (chartW - barW * count) / (count + 1);

      drawGrid(ctx, W, H, pad, chartH, (i) => `${100 - i * 25}%`);

      for (let i = 0; i < count; i++) {
        const day = days[i];
        const x = pad.left + gap + i * (barW + gap);

        if (day && day.monitoredMs > 0) {
          const pct = day.goodPostureMs / day.monitoredMs;
          const barH = pct * chartH;
          ctx.fillStyle = pct >= 0.75 ? '#34c759' : pct >= 0.5 ? '#ff9500' : '#ff3b30';
          roundRect(ctx, x, pad.top + chartH - barH, barW, barH, Math.min(4, barW / 2));
          ctx.fill();

          if (barH > 20 && barW > 18) {
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${barW > 24 ? 10 : 8}px system-ui`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(`${Math.round(pct * 100)}%`, x + barW / 2, pad.top + chartH - barH + 16);
          }
        } else {
          ctx.fillStyle = '#e8e8ed';
          roundRect(ctx, x, pad.top + chartH - 4, barW, 4, 2);
          ctx.fill();
        }

        const showLabel = count <= 7 || count <= 14 || ((i + 1) % 5 === 0 || i === 0);
        if (showLabel) {
          ctx.fillStyle = '#b0b0b5';
          ctx.font = `${count > 14 ? 9 : 11}px system-ui`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText(labels[i], x + barW / 2, pad.top + chartH + 8);
        }
      }
    }

    function drawWeeklyChart(canvas, days, locale) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      const labels = [
        t('report.mon'), t('report.tue'), t('report.wed'),
        t('report.thu'), t('report.fri'), t('report.sat'), t('report.sun')
      ];
      drawScoreBars(ctx, days, labels, W, H);
    }

    function drawMonthlyChart(canvas, days) {
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      const labels = days.map((_, i) => String(i + 1));
      drawScoreBars(ctx, days, labels, W, H);
    }
  </script>
</body>
</html>
